<svg width="2022" height="584" viewBox="0 0 2022 584" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panelBg" x1="6" y1="291" x2="2000" y2="291" gradientUnits="userSpaceOnUse">
