        <rect x="911" y="375" width="58" height="58" rx="18" fill="#FDFDFD" stroke="#E0E4E8" stroke-width="2"/>
        <path d="M925 405L936 416L954 388" stroke="#1D2430" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="988" y="386" width="143" height="38" rx="19" fill="#F3E7E1"/>
        <text x="1059.5" y="410" text-anchor="middle" fill="#BB6431" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700">COMPLETED</text>
        <text x="912" y="468" fill="#202630" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600">
