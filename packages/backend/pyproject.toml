[project]
name = "deepeye-backend"
version = "0.1.0"
description = "DeepEye Backend Service"
authors = [{name = "DeepEye Team"}]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.109.0",
    "httpx>=0.28.1",
    "uvicorn>=0.27.0",
    "redis>=5.0.1",
    "python-multipart>=0.0.26",
    "PyJWT[crypto]>=2.10.1",
    "passlib[bcrypt]==1.7.4",
    "bcrypt<4.0.0",
    "email-validator>=2.0.0",
    "celery>=5.3.6",
    "python-dotenv>=1.2.2",
    "pydantic-settings>=2.0.0",
    "langgraph-checkpoint-postgres>=1.0.0",
    "psycopg[binary,pool]>=3.1.8",
    "psycopg2-binary>=2.9.9",
    "deepeye[openai]",
    "docker>=7.0.0",
    "minio>=7.2.0",
    "json5",
    "pandas",
    "openpyxl",
    "pyarrow",
    "pymysql>=1.1.0",
    "jinja2",
    "plotly",
    "openai",
    "statsmodels",
    "pyecharts",
    "azure-cognitiveservices-speech>=1.40.0",
    "alembic>=1.18.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "ruff>=0.15.4",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]
