  <rect width="1024" height="768" fill="url(#workspaceShellBg)"/>
  <rect x="0.5" y="0.5" width="1023" height="767" rx="32" fill="url(#workspaceCardBg)" stroke="#E4E6EB"/>

  <g id="toolbar">
    <rect x="0.5" y="0.5" width="1023" height="54" rx="32" fill="#F8F8FA" stroke="#E5E7EB"/>
    <path d="M16 54H1008" stroke="#E6E8EC"/>

    <rect x="6" y="10" width="74" height="34" rx="17" fill="#FFFFFF" stroke="#E5E7EB"/>
    <g transform="translate(18 19)" stroke="#4B5563" stroke-width="1.9" fill="none">
      <use href="#icon-menu" width="14" height="14"/>
    </g>
    <text x="40" y="31" fill="#374151" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600">Menu</text>

    <text x="88" y="33" fill="#111827" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700">Workspace</text>
    <text x="180" y="33" fill="#6B7280" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600">Reports, dashboards, files, and previews</text>

    <rect x="736" y="10" width="139" height="34" rx="17" fill="#FFFFFF" stroke="#E5E7EB"/>
    <g transform="translate(749 19)" stroke="#4B5563" stroke-width="1.8" fill="none">
      <use href="#icon-hide-assistant" width="14" height="14"/>
    </g>
    <text x="773" y="32" fill="#374151" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700">Hide assistant</text>

    <rect x="882" y="10" width="104" height="34" rx="17" fill="#17191F"/>
    <g transform="translate(896 19)" stroke="#FFFFFF" stroke-width="1.9" fill="none">
      <use href="#icon-plus" width="14" height="14"/>
    </g>
    <text x="920" y="32" fill="#FFFFFF" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700">New chat</text>
  </g>

  <g id="empty-state">
    <rect x="479" y="219" width="66" height="24" rx="12" fill="#F9FAFB" stroke="#E5E7EB"/>
    <text x="512" y="235" text-anchor="middle" fill="#6B7280" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1">WORKSPACE</text>

    <g transform="translate(482 261)" stroke="#B8BDC7" stroke-width="1.7" fill="none">
      <use href="#icon-document" width="60" height="60"/>
