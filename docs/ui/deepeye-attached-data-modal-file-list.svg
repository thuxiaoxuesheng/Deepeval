<svg width="1724" height="548" viewBox="0 0 1724 548" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>DeepEye Attached Data Modal File List</title>
  <defs>
    <linearGradient id="overlayBgWide" x1="0" y1="0" x2="0" y2="548" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CDD1D7"/>
      <stop offset="1" stop-color="#BEC4CD"/>
    </linearGradient>
    <linearGradient id="modalBgWide" x1="16" y1="8" x2="16" y2="515" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FAFAFB"/>
    </linearGradient>
    <symbol id="icon-upload" viewBox="0 0 24 24">
      <path d="M4 16v1a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-1" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="m16 8-4-4-4 4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 4v12" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24">
      <path d="M12 4v16M20 12H4" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-close" viewBox="0 0 24 24">
      <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-cloud-upload" viewBox="0 0 24 24">
      <path d="M7.5 15 12 10.5 16.5 15" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 10.5V21" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M20.25 16.5A3.75 3.75 0 0 0 18 9.672 5.25 5.25 0 0 0 7.5 8.25a4.5 4.5 0 0 0-.63 8.956" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-file" viewBox="0 0 24 24">
      <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <rect width="1724" height="548" fill="url(#overlayBgWide)"/>
  <rect x="16" y="7" width="1680" height="510" rx="36" fill="url(#modalBgWide)" stroke="#D8DDE5" stroke-width="2"/>

  <g id="header">
    <text x="61" y="76" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="0.08em">ATTACHED DATA</text>
    <text x="61" y="123" fill="#6F7889" font-family="'Segoe UI', Arial, sans-serif" font-size="21" font-weight="500">Everything attached here is available to the assistant automatically.</text>

    <rect x="1107" y="52" width="169" height="63" rx="31.5" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="2"/>
    <g transform="translate(1130 73)" stroke="#1E2430" stroke-width="2.2" fill="none">
      <use href="#icon-upload" width="23" height="23"/>
    </g>
    <text x="1174" y="93" fill="#1F2430" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700">Upload file</text>

    <rect x="1294" y="52" width="188" height="63" rx="31.5" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="2"/>
    <g transform="translate(1321 73)" stroke="#1E2430" stroke-width="2.2" fill="none">
      <use href="#icon-plus" width="23" height="23"/>
    </g>
    <text x="1362" y="93" fill="#1F2430" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700">Database</text>

    <circle cx="1522" cy="83" r="24" fill="#F5F6F8"/>
    <text x="1522" y="90" text-anchor="middle" fill="#6F7889" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700">1</text>

    <circle cx="1628" cy="73" r="33" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="2"/>
    <g transform="translate(1611 56)" stroke="#1E2430" stroke-width="2.3" fill="none">
      <use href="#icon-close" width="34" height="34"/>
    </g>
  </g>

  <g id="dropzone">
    <rect x="62" y="161" width="1588" height="149" rx="31" fill="#FFFFFF" stroke="#DCE1E8" stroke-width="2" stroke-dasharray="5 6"/>
    <rect x="99" y="194" width="85" height="84" rx="28" fill="#F5F5F7"/>
    <g transform="translate(120 215)" stroke="#1E2430" stroke-width="2.4" fill="none">
      <use href="#icon-cloud-upload" width="42" height="42"/>
    </g>
    <text x="212" y="225" fill="#1F2430" font-family="'Segoe UI', Arial, sans-serif" font-size="25" font-weight="700">Drag files here or click to browse</text>
    <text x="212" y="266" fill="#6F7889" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="500">CSV, JSON, Excel, and Parquet are supported.</text>
  </g>

  <g id="file-card">
    <rect x="62" y="340" width="1588" height="130" rx="32" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="2"/>
    <rect x="87" y="372" width="67" height="67" rx="22" fill="#F5F5F7"/>
    <g transform="translate(110 395)" stroke="#1F2430" stroke-width="2.2" fill="none">
      <use href="#icon-file" width="22" height="22"/>
    </g>

    <text x="180" y="395" fill="#1F2430" font-family="'Segoe UI', Arial, sans-serif" font-size="27" font-weight="700">coffee_city_campaign_calendar_q4_2025.csv</text>
    <text x="180" y="435" fill="#7B8190" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="500">FILE</text>

    <rect x="1564" y="376" width="58" height="58" rx="19" fill="#FBFBFC" stroke="#D9DEE6" stroke-width="2"/>
    <g transform="translate(1581 393)" stroke="#1F2430" stroke-width="2.2" fill="none">
      <use href="#icon-close" width="24" height="24"/>
    </g>
  </g>
</svg>
