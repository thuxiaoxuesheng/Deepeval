  <rect width="1585" height="412" fill="#FAFBFC"/>

  <g id="dashboard-progress-panel">
    <rect x="7" y="10" width="1571" height="395" rx="26" fill="url(#panelBg)" stroke="#BFD4D3" stroke-width="1.5"/>
    <g clip-path="url(#panelClip)">
      <rect x="7" y="10" width="1571" height="395" fill="url(#coolGrid)" opacity="0.82"/>
      <rect x="1190" y="10" width="388" height="395" fill="url(#panelGlow)"/>
    </g>

    <g id="header">
      <rect x="30" y="31" width="58" height="58" rx="17" fill="#EEF6F6" stroke="#C7DBDB" stroke-width="1.5"/>
      <g transform="translate(42 43)" fill="#3B9692" stroke="#2F817D" stroke-width="0.4">
        <use href="#icon-layout-dashboard" width="24" height="24"/>
      </g>
      <text x="100" y="50" fill="#2C7B77" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" letter-spacing="1">DASHBOARD</text>
      <rect x="198" y="31" width="202" height="34" rx="17" fill="#EEF6F6" stroke="#C5DAD9" stroke-width="1.5"/>
      <text x="209" y="53" fill="#206C68" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" letter-spacing="0.6">VISUAL ANALYSIS PIPELINE</text>

      <text x="100" y="85" fill="#1E2431" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700">Generating dashboard</text>
      <text x="100" y="110" fill="#74808B" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="500">DeepEye is still designing the dashboard structure and packaging the preview app.</text>
    </g>

    <g id="status" text-anchor="end">
      <rect x="1451" y="31" width="106" height="39" rx="19.5" fill="#F9FCFC" stroke="#C5D9D8" stroke-width="1.5"/>
      <circle cx="1469" cy="50.5" r="5" fill="#0F766E"/>
      <text x="1540" y="56" fill="#28746F" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">RUNNING</text>

      <text x="1561" y="108" fill="#11182F" font-family="'Segoe UI', Arial, sans-serif" font-size="40" font-weight="800">14%</text>
      <text x="1561" y="134" fill="#70808A" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="500">Generating dashboard title and</text>
      <text x="1561" y="159" fill="#70808A" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="500">description...</text>
    </g>

    <g id="progress-bar">
      <rect x="28" y="180" width="1530" height="13" rx="6.5" fill="#E7E9EC"/>
      <rect x="28" y="180" width="214" height="13" rx="6.5" fill="#55A8A4"/>
    </g>

    <g id="metrics">
      <rect x="28" y="210" width="103" height="37" rx="18.5" fill="#FCFEFE" stroke="#C7D9D8" stroke-width="1.5"/>
      <text x="42" y="233.5" fill="#5F6D78" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.4">STAGE</text>
      <text x="91" y="233.5" fill="#1F2531" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700">1/6</text>

      <rect x="140" y="210" width="212" height="37" rx="18.5" fill="#FCFEFE" stroke="#C7D9D8" stroke-width="1.5"/>
      <text x="154" y="233.5" fill="#5F6D78" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.4">NODE</text>
      <text x="205" y="233.5" fill="#1F2531" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700">generate_dashboard</text>
    </g>

    <g id="cards">
      <g id="card-1">
        <rect x="28" y="266" width="243" height="115" rx="20" fill="#EDF3F3" stroke="#9FC4C1" stroke-width="1.5"/>
        <rect x="44" y="280" width="46" height="46" rx="15" fill="#FCFEFE" stroke="#C5DAD9" stroke-width="1.5"/>
        <g transform="translate(55 291)" stroke="#D49A25" fill="none">
          <use href="#icon-compass" width="24" height="24"/>
        </g>
        <text x="239" y="305" text-anchor="end" fill="#0E6B66" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">RUNNING</text>
        <text x="44" y="349" fill="#0F172E" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600">Generate title and framing</text>
      </g>

      <g id="card-2">
        <rect x="285" y="266" width="243" height="115" rx="20" fill="#FCFEFE" stroke="#D5E2E2" stroke-width="1.5"/>
        <rect x="301" y="280" width="46" height="46" rx="15" fill="#FDFEFE" stroke="#D5E0E0" stroke-width="1.5"/>
        <g transform="translate(312 291)">
          <use href="#icon-chart-bars" width="24" height="24"/>
        </g>
        <text x="494" y="305" text-anchor="end" fill="#717B86" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">QUEUED</text>
        <text x="301" y="351" fill="#687381" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600">Design visualizations</text>
      </g>

      <g id="card-3">
        <rect x="542" y="266" width="243" height="115" rx="20" fill="#FCFEFE" stroke="#D5E2E2" stroke-width="1.5"/>
        <rect x="558" y="280" width="46" height="46" rx="15" fill="#FDFEFE" stroke="#D5E0E0" stroke-width="1.5"/>
        <g transform="translate(569 291)" stroke="#E3714D" fill="none">
          <use href="#icon-calculator" width="24" height="24"/>
        </g>
        <text x="751" y="305" text-anchor="end" fill="#717B86" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">QUEUED</text>
        <text x="558" y="351" fill="#687381" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600">Design key metrics</text>
      </g>

      <g id="card-4">
        <rect x="799" y="266" width="243" height="115" rx="20" fill="#FCFEFE" stroke="#D5E2E2" stroke-width="1.5"/>
        <rect x="815" y="280" width="46" height="46" rx="15" fill="#FDFEFE" stroke="#D5E0E0" stroke-width="1.5"/>
        <g transform="translate(826 291)" stroke="#8B7FE2" fill="none">
          <use href="#icon-link" width="24" height="24"/>
        </g>
        <text x="1008" y="305" text-anchor="end" fill="#717B86" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">QUEUED</text>
        <text x="815" y="351" fill="#687381" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600">Design interactions</text>
      </g>

      <g id="card-5">
        <rect x="1056" y="266" width="243" height="115" rx="20" fill="#FCFEFE" stroke="#D5E2E2" stroke-width="1.5"/>
        <rect x="1072" y="280" width="46" height="46" rx="15" fill="#FDFEFE" stroke="#D5E0E0" stroke-width="1.5"/>
        <g transform="translate(1083 291)" stroke="#8EBE4E" fill="none">
          <use href="#icon-puzzle" width="24" height="24"/>
        </g>
        <text x="1265" y="305" text-anchor="end" fill="#717B86" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">QUEUED</text>
        <text x="1072" y="351" fill="#687381" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600">Consolidate layout</text>
      </g>

      <g id="card-6">
        <rect x="1313" y="266" width="243" height="115" rx="20" fill="#FCFEFE" stroke="#D5E2E2" stroke-width="1.5"/>
        <rect x="1329" y="280" width="46" height="46" rx="15" fill="#FDFEFE" stroke="#D5E0E0" stroke-width="1.5"/>
        <g transform="translate(1340 291)" stroke="#F26C8E" fill="none">
          <use href="#icon-rocket" width="24" height="24"/>
        </g>
        <text x="1522" y="305" text-anchor="end" fill="#717B86" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">QUEUED</text>
        <text x="1329" y="351" fill="#687381" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="600">Implement and deploy preview</text>
      </g>
    </g>
  </g>
</svg>
