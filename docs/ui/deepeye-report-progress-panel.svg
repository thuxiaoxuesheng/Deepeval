      <text x="118" y="667" fill="#1F2531" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700">Report is in progress</text>
      <text x="118" y="704" fill="#808694" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="500">The workflow is still running. This pane will switch to the final document automatically.</text>
