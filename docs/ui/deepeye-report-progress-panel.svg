        <rect x="328" y="353" width="264" height="206" rx="28" fill="#FCFAF9" stroke="#DDCECA" stroke-width="2"/>
        <rect x="349" y="375" width="58" height="58" rx="18" fill="#FDFDFD" stroke="#E0E4E8" stroke-width="2"/>
        <path d="M363 405L374 416L392 388" stroke="#1D2430" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
