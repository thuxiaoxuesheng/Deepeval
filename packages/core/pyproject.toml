[project]
name = "deepeye"
version = "0.1.0"
description = "A lightweight, modular Data Agent System built on LangGraph."
readme = "README.md"
requires-python = ">=3.11"
authors = [{name = "DeepEye Team"}]
dependencies = [
    "langchain>=0.3.0",
    "langgraph>=0.2.0",
    "langfuse>=2.0.0",
    "pydantic>=2.0.0",
    "rank_bm25>=0.2.2",
    "langchain-community>=0.3.0",
    "sqlalchemy>=2.0.0",
    "rich>=14.2.0",
    "langgraph-prebuilt<1.0.9",
]

[project.optional-dependencies]
openai = ["langchain-openai>=0.1.0"]
anthropic = ["langchain-anthropic>=0.1.0"]
qdrant = ["qdrant-client>=1.7.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["deepeye"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
