        <text x="778.5" y="410" text-anchor="middle" fill="#BB6431" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700">COMPLETED</text>
        <text x="631" y="468" fill="#202630" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600">
