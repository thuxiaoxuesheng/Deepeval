<svg width="992" height="759" viewBox="0 0 992 759" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>DeepEye Attached Data Modal</title>
  <defs>
    <linearGradient id="overlayBg" x1="0" y1="0" x2="0" y2="759" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8DADF"/>
      <stop offset="1" stop-color="#C8CCD3"/>
    </linearGradient>
    <linearGradient id="modalBg" x1="12" y1="14" x2="12" y2="745" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FAFAFB"/>
    </linearGradient>
    <symbol id="icon-upload" viewBox="0 0 24 24">
      <path d="M4 16v1a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-1" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="m16 8-4-4-4 4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 4v12" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-close" viewBox="0 0 24 24">
      <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-cloud-upload" viewBox="0 0 24 24">
      <path d="M7.5 15 12 10.5 16.5 15" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 10.5V21" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M20.25 16.5A3.75 3.75 0 0 0 18 9.672 5.25 5.25 0 0 0 7.5 8.25a4.5 4.5 0 0 0-.63 8.956" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-chevron-down" viewBox="0 0 20 20">
      <path d="m5.5 7.5 4.5 5 4.5-5" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-file" viewBox="0 0 24 24">
      <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <rect width="992" height="759" fill="url(#overlayBg)"/>
  <rect x="12" y="15" width="968" height="729" rx="34" fill="url(#modalBg)" stroke="#E1E4EA"/>

  <g id="header">
    <text x="36" y="50" fill="#353B46" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1.3">ATTACHED DATA</text>
    <text x="36" y="80" fill="#7C8290" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="500">Everything attached here is available to the assistant automatically.</text>

    <rect x="616" y="39" width="116" height="36" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <g transform="translate(632 50)" stroke="#1F2430" stroke-width="1.8" fill="none">
      <use href="#icon-upload" width="16" height="16"/>
    </g>
    <text x="655" y="62" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700">Upload file</text>

    <rect x="740" y="39" width="111" height="36" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <g transform="translate(756 50)" stroke="#232834" stroke-width="1.8" fill="none">
      <use href="#icon-close" width="16" height="16"/>
    </g>
    <text x="780" y="62" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700">Database</text>

    <circle cx="872" cy="57" r="13" fill="#F8F8FA"/>
    <text x="872" y="61" text-anchor="middle" fill="#8A919B" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700">1</text>

    <circle cx="934" cy="57" r="20" fill="#FFFFFF" stroke="#E5E7EB"/>
    <g transform="translate(924 47)" stroke="#232834" stroke-width="1.8" fill="none">
      <use href="#icon-close" width="20" height="20"/>
    </g>
  </g>

  <g id="dropzone">
    <rect x="36" y="102" width="908" height="84" rx="22" fill="#FFFFFF" stroke="#E5E7EB" stroke-dasharray="3 4"/>
    <rect x="57" y="121" width="42" height="42" rx="14" fill="#F5F6F8"/>
    <g transform="translate(70 134)" stroke="#3B4250" stroke-width="1.7" fill="none">
      <use href="#icon-cloud-upload" width="16" height="16"/>
    </g>
    <text x="121" y="139" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700">Drag files here or click to browse</text>
    <text x="121" y="162" fill="#7C8290" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="500">CSV, JSON, Excel, and Parquet are supported.</text>
  </g>

  <g id="database-panel">
    <rect x="37" y="205" width="907" height="438" rx="22" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="54" y="234" fill="#7B8190" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="1.2">DATABASE CONNECTION</text>
    <text x="54" y="260" fill="#7C8290" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="500">Create a reusable live source for reports, dashboards, and follow-up analysis.</text>

    <text x="54" y="292" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700">Display name</text>
    <rect x="54" y="304" width="432" height="42" rx="14" fill="#FBFBFC" stroke="#E5E7EB"/>
    <text x="68" y="330" fill="#B0B6C0" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="500">Revenue warehouse</text>

    <text x="496" y="292" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700">Engine</text>
    <rect x="496" y="304" width="432" height="42" rx="14" fill="#FBFBFC" stroke="#E5E7EB"/>
    <text x="512" y="330" fill="#374151" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600">PostgreSQL</text>
    <g transform="translate(895 318)" stroke="#7C8290" stroke-width="1.8" fill="none">
      <use href="#icon-chevron-down" width="16" height="16"/>
    </g>

    <text x="54" y="374" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700">Connection URI</text>
    <rect x="54" y="387" width="874" height="102" rx="16" fill="#FBFBFC" stroke="#E5E7EB"/>
    <text x="68" y="414" fill="#B0B6C0" font-family="'Cascadia Code', 'Consolas', monospace" font-size="11" font-weight="500">postgresql://user:password@localhost:5432/analytics</text>

    <text x="54" y="516" fill="#7B8190" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="1">EXAMPLE</text>
    <rect x="54" y="529" width="874" height="44" rx="14" fill="#FBFBFC" stroke="#E5E7EB"/>
    <text x="68" y="555" fill="#4B5563" font-family="'Cascadia Code', 'Consolas', monospace" font-size="11" font-weight="600">postgresql://user:password@localhost:5432/analytics</text>

    <rect x="54" y="587" width="86" height="40" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="97" y="611" text-anchor="middle" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700">测试连接</text>
    <rect x="151" y="587" width="148" height="40" rx="14" fill="#17191F"/>
    <text x="225" y="611" text-anchor="middle" fill="#FFFFFF" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700">Connect database</text>
  </g>

  <g id="file-row">
    <rect x="37" y="661" width="907" height="71" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <g transform="translate(61 684)" stroke="#4B5563" stroke-width="1.7" fill="none">
      <use href="#icon-file" width="20" height="20"/>
    </g>
    <text x="103" y="694" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700">coffee_city_campaign_calendar_q4_2025.csv</text>
    <text x="103" y="714" fill="#8A919B" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700">FILE</text>
    <circle cx="913" cy="697" r="16" fill="#F8F8FA" stroke="#E5E7EB"/>
    <g transform="translate(905 689)" stroke="#4B5563" stroke-width="1.8" fill="none">
      <use href="#icon-close" width="16" height="16"/>
    </g>
  </g>
</svg>
