name: Import DeepEye

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/import-deepeye.yml"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Deepeval
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Import DeepEye project snapshot
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TMP_DIR="$(mktemp -d)"
          git clone --depth 1 --branch master https://github.com/thuxiaoxuesheng/DeepEye.git "$TMP_DIR/DeepEye"

          # Remove current repository contents, but keep .git and this import workflow.
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            ! -name ".github" \
            -exec rm -rf {} +

          mkdir -p .github/workflows

          # Copy DeepEye contents while preserving this import workflow.
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github/workflows/import-deepeye.yml" \
            "$TMP_DIR/DeepEye/" ./

          # Do not import source workflows in this automated commit; GitHub blocks workflow-file changes by GITHUB_TOKEN in many repos.
          rm -rf .github/workflows/*
          git checkout -- .github/workflows/import-deepeye.yml

          git add -A
          git commit -m "Import DeepEye project snapshot" || echo "No changes to commit"
          git push origin main
