          <path d="M-4.7 9.6L-7.7 16.6L-2 15.1L-0.8 9.6Z" fill="#2D4B90"/>
          <path d="M4.9 9.6L7.8 16.6L2.1 15.1L0.9 9.6Z" fill="#D84D3B"/>
          <path d="M0 18.1C2 15.9 4.3 16.6 5.4 19.1C4 21.7 2.6 23.5 0 24.7C-2.6 23.5 -4 21.7 -5.4 19.1C-4.3 16.6 -2 15.9 0 18.1Z" fill="#F6D44F"/>
