services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      # Internal credentials
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # This variable is read by our custom init script
      - POSTGRES_MULTIPLE_DATABASES=deepeye,deepeye_state
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount init script to auto-create databases
      - ./docker/scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Global sales ops DB for heterogeneous workflow test (global_sales_workflow_sample)
  # global-ops-db:
  #   image: postgres:15-alpine
  #   environment:
  #     - POSTGRES_USER=${GLOBAL_OPS_DB_USER}
  #     - POSTGRES_PASSWORD=${GLOBAL_OPS_DB_PASSWORD}
  #     - POSTGRES_DB=${GLOBAL_OPS_DB_NAME}
  #   volumes:
  #     - global_ops_db_data:/var/lib/postgresql/data
  #     - ./docker/test-db/global_ops_init.sql:/docker-entrypoint-initdb.d/init.sql
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${GLOBAL_OPS_DB_USER} -d ${GLOBAL_OPS_DB_NAME}"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

  # 异构工作流手测样例数据库
  retail-ops-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${RETAIL_OPS_DB_USER}
      - POSTGRES_PASSWORD=${RETAIL_OPS_DB_PASSWORD}
      - POSTGRES_DB=${RETAIL_OPS_DB_NAME}
    volumes:
      - retail_ops_db_data:/var/lib/postgresql/data
      - ./docker/test-db/retail_ops_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RETAIL_OPS_DB_USER} -d ${RETAIL_OPS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  runtime-control:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - .env
    environment:
      - DOCKER_CONTROL_MODE=local
      - STARTUP_WARMUP_ENABLED=false
      - CELERY_STARTUP_WARMUP_ENABLED=false
      - LANGGRAPH_CHECKPOINTER_AUTO_SETUP=false
    command:
      - /bin/sh
      - -lc
      - >
        /app/.venv/bin/python -m uvicorn app.runtime_control.main:app
        --host 0.0.0.0
        --port 8010
        --reload
    expose:
      - "8010"
    volumes:
      - ./packages/backend:/app/packages/backend
      - ./packages/core:/app/packages/core
      - .:/app/project
      - workspace_data:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - .env
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      runtime-control:
        condition: service_healthy
    environment:
      - DOCKER_CONTROL_MODE=remote
      - SANDBOX_CLEANUP_ENABLED=false
    command:
      - /bin/sh
      - -lc
      - >
        /app/.venv/bin/python -m uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --limit-concurrency "${API_LIMIT_CONCURRENCY:-200}"
        --timeout-keep-alive "${API_TIMEOUT_KEEP_ALIVE_SECONDS:-60}"
    expose:
      - "8000"
    volumes:
      - ./packages/backend:/app/packages/backend
      - ./packages/core:/app/packages/core
      - .:/app/project
      - workspace_data:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  backend-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - .env
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      runtime-control:
        condition: service_healthy
    environment:
      - DOCKER_CONTROL_MODE=remote
    command:
      - /bin/sh
      - -lc
      - >
        /app/.venv/bin/python -m celery -A app.core.celery_app worker
        --loglevel=info
        --concurrency="${CELERY_WORKER_CONCURRENCY:-4}"
    volumes:
      - ./packages/backend:/app/packages/backend
      - ./packages/core:/app/packages/core
      - .:/app/project
      - workspace_data:/workspace
    restart: unless-stopped

  backend-migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic -c /app/packages/backend/alembic.ini upgrade head
    volumes:
      - ./packages/backend:/app/packages/backend
      - ./packages/core:/app/packages/core
      - .:/app/project
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    # Removed direct port mapping to host
    environment:
      # Automatically derive VITE_API_URL from the host gateway port
      - VITE_API_URL=/api/v1
      - VITE_AUTH_URL=/api/auth
      - VITE_API_TIMEOUT=30000
    volumes:
      - ./packages/frontend/src:/app/src
      - /app/node_modules
    depends_on:
      - backend-api
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    ports:
      - "${HOST_GATEWAY_PORT:-8080}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  minio_data:
  retail_ops_db_data:
  global_ops_db_data:
  workspace_data:

networks:
  default:
