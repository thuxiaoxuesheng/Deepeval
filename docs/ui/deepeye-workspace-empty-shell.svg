      <g transform="translate(14 16)" stroke="#7C8494" stroke-width="1.7" fill="none">
        <use href="#icon-folder" width="18" height="18"/>
      </g>
      <text x="37" y="24" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700">Files</text>
      <text x="37" y="47" fill="#7C8290" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600">Browse session files and generated</text>
      <text x="37" y="62" fill="#7C8290" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600">outputs.</text>
      <circle cx="274" cy="24" r="11.5" fill="#FCFCFD" stroke="#E5E7EB"/>
      <g transform="translate(268 18)" stroke="#8A91A0" stroke-width="1.8" fill="none">
        <use href="#icon-open-arrow" width="12" height="12"/>
      </g>
    </g>

    <g transform="translate(499 380)">
      <rect width="301" height="72" rx="16" fill="#FFFFFF" stroke="#E6E8ED"/>
      <g transform="translate(14 16)" stroke="#7C8494" stroke-width="1.7" fill="none">
        <use href="#icon-workflow" width="18" height="18"/>
      </g>
      <text x="37" y="24" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700">Workflow</text>
      <text x="37" y="47" fill="#7C8290" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600">Inspect node graph and runtime</text>
      <text x="37" y="62" fill="#7C8290" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600">progression.</text>
      <circle cx="274" cy="24" r="11.5" fill="#FCFCFD" stroke="#E5E7EB"/>
      <g transform="translate(268 18)" stroke="#8A91A0" stroke-width="1.8" fill="none">
        <use href="#icon-open-arrow" width="12" height="12"/>
      </g>
    </g>

    <g transform="translate(190 460)">
      <rect width="301" height="58" rx="16" fill="#FFFFFF" stroke="#E6E8ED"/>
      <g transform="translate(14 16)" stroke="#7C8494" stroke-width="1.7" fill="none">
        <use href="#icon-document" width="18" height="18"/>
      </g>
      <text x="37" y="25" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700">Report</text>
      <text x="37" y="46" fill="#7C8290" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600">Read generated report content and steps.</text>
      <circle cx="274" cy="24" r="11.5" fill="#FCFCFD" stroke="#E5E7EB"/>
      <g transform="translate(268 18)" stroke="#8A91A0" stroke-width="1.8" fill="none">
        <use href="#icon-open-arrow" width="12" height="12"/>
      </g>
    </g>

    <g transform="translate(499 460)">
      <rect width="301" height="58" rx="16" fill="#FFFFFF" stroke="#E6E8ED"/>
      <g transform="translate(14 16)" fill="#7C8494" stroke="#7C8494" stroke-width="0.35">
        <use href="#icon-dashboard" width="18" height="18"/>
      </g>
      <text x="37" y="25" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700">Dashboard</text>
      <text x="37" y="46" fill="#7C8290" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600">Preview charts and visual analytics results.</text>
      <circle cx="274" cy="24" r="11.5" fill="#FCFCFD" stroke="#E5E7EB"/>
      <g transform="translate(268 18)" stroke="#8A91A0" stroke-width="1.8" fill="none">
        <use href="#icon-open-arrow" width="12" height="12"/>
      </g>
    </g>

    <g transform="translate(190 528)">
      <rect width="301" height="72" rx="16" fill="#FFFFFF" stroke="#E6E8ED"/>
      <g transform="translate(14 16)" stroke="#7C8494" stroke-width="1.7" fill="none">
        <use href="#icon-video" width="18" height="18"/>
      </g>
      <text x="37" y="24" fill="#232834" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700">Video Preview</text>
      <text x="37" y="47" fill="#7C8290" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600">Track and preview generated video</text>
      <text x="37" y="62" fill="#7C8290" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600">artifacts.</text>
      <circle cx="274" cy="24" r="11.5" fill="#FCFCFD" stroke="#E5E7EB"/>
      <g transform="translate(268 18)" stroke="#8A91A0" stroke-width="1.8" fill="none">
        <use href="#icon-open-arrow" width="12" height="12"/>
      </g>
    </g>
