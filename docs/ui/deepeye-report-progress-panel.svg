        <rect x="630" y="375" width="58" height="58" rx="18" fill="#FDFDFD" stroke="#E0E4E8" stroke-width="2"/>
        <path d="M644 405L655 416L673 388" stroke="#1D2430" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
