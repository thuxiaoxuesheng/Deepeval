<script>
// --- 🎨 颜值核心：Template 3 (Design Aesthetics Diary Edition) ---
const themeName = 'template3_aesthetic';
const template3Palette = {
    // 1. Palette: fully extracted from the image "Design Aesthetics Diary"
    // Order: Salmon -> Peach -> Sage -> Sky
    color: [
        '#E18182', // Metric 1 (Primary)
        '#F9CE9C', // Metric 2 (Secondary/Warm)
        '#BBCFC3', // Metric 3 (Tertiary/Nature)
        '#C9DDE3', // Metric 4 (Cold/Neutral)
        '#D8A49B', // Extra color: deeper pink
        '#A5B9C0'  // Extra color: deeper blue-gray
    ],
    backgroundColor: 'rgba(0,0,0,0)',
    textStyle: { fontFamily: 'Inter, -apple-system, system-ui, sans-serif' },

    title: {
        textStyle: { color: '#374151', fontWeight: '700', fontSize: 16 },
        subtextStyle: { color: '#9ca3af' }
    },

    // 2. Layout: keep a widescreen feel
    grid: {
        top: 45,
        left: '1%',
        right: '1%',
        bottom: '2%',
        containLabel: true,
        borderWidth: 0
    },

    categoryAxis: {
        axisLine: { show: true, lineStyle: { color: '#f3f4f6' } }, // Very light gray line
        axisTick: { show: false },
        axisLabel: { color: '#6b7280', margin: 14, fontSize: 11, fontWeight: 500 },
        splitLine: { show: false }
    },
    valueAxis: {
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: { color: '#9ca3af', margin: 10, fontSize: 11 },
        splitLine: {
            show: true,
            lineStyle: { color: '#f3f4f6', type: 'dashed', width: 1 }
        }
    },

    // --- Chart style adjustments: soft, matte texture ---

    // 1. Line chart: use Salmon (#E18182) gradient
    line: {
        smooth: true,
        width: 3,
        symbol: 'circle',
        symbolSize: 6,
        showSymbol: false,
        itemStyle: { 
            borderWidth: 1, 
            borderColor: '#fff',
            color: '#E18182' 
        },
        areaStyle: {
            opacity: 0.2, 
            color: {
                type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                colorStops: [
                    { offset: 0, color: '#E18182' },
                    { offset: 1, color: 'rgba(255, 255, 255, 0)' }
                ]
            }
        }
    },

    // 2. Bar chart: fresh gradient from Sky (#C9DDE3) to Sage (#BBCFC3)
    bar: {
        itemStyle: {
            borderRadius: [4, 4, 0, 0],
            color: {
                type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                colorStops: [
                    { offset: 0, color: '#BBCFC3' }, // Top: Sage
                    { offset: 1, color: '#C9DDE3' }  // Bottom: Sky
                ]
            }
        },
        barMaxWidth: 40,
        barCategoryGap: '35%'
    },

    // 3. Boxplot: use Peach (#F9CE9C)
    boxplot: {
        itemStyle: {
            color: '#fffbf5',       // Very light apricot background
            borderColor: '#F9CE9C', // Apricot border
            borderWidth: 1.5
        },
        emphasis: {
            itemStyle: {
                color: '#F9CE9C',
                borderColor: '#E6B07E',
                borderWidth: 2
            }
        },
        boxWidth: [10, 40]
    },

    // 4. Heatmap: warm–cool transition from Sky -> Salmon
    heatmap: {
        itemStyle: {
            borderColor: '#fff',
            borderWidth: 2
        },
        label: { show: false }
    },

    // 5. VisualMap: smooth color transition
    visualMap: {
        type: 'continuous',
        inRange: {
            color: [
                '#C9DDE3', // Low: Sky
                '#BBCFC3', // Mid: Sage
                '#F9CE9C', // Mid-high: Peach
                '#E18182'  // High: Salmon
            ]
        },
        itemWidth: 12,
        itemHeight: 100,
        orient: 'horizontal',
        left: 'center',
        top: 0,
        text: ['High', 'Low'],
        textStyle: { color: '#9ca3af', fontSize: 10 },
        calculable: true
    },

    // 6. Pie/donut: directly use four colors from the palette
    pie: {
        itemStyle: {
            borderWidth: 2,
            borderColor: '#ffffff'
        }
    },

    tooltip: {
        backgroundColor: 'rgba(255, 255, 255, 0.95)',
        borderColor: '#E18182', // Use primary color for border
        borderWidth: 0,
        textStyle: { color: '#374151', fontSize: 12 },
        padding: [10, 14],
        extraCssText: 'box-shadow: 0 4px 20px -5px rgba(225, 129, 130, 0.2); border-left: 4px solid #E18182; border-radius: 4px;'
    },
    
    legend: {
        icon: 'circle',
        textStyle: { color: '#6b7280' }
    }
};

// Register theme globally for use in app.js
(function() {
    // Ensure echarts is loaded
    if (typeof window.echarts !== 'undefined') {
        window.echarts.registerTheme(themeName, template3Palette);
        // Expose theme configuration globally for renderCharts in app.js (generic variable names)
        window.currentPalette = template3Palette;
        window.currentThemeName = themeName;
    } else {
        // If echarts is not yet loaded, wait until it is ready
        const checkECharts = setInterval(() => {
            if (typeof window.echarts !== 'undefined') {
                window.echarts.registerTheme(themeName, template3Palette);
                window.currentPalette = template3Palette;
                window.currentThemeName = themeName;
                clearInterval(checkECharts);
            }
        }, 50);
        
        // Stop checking after 10 seconds to avoid infinite wait
        setTimeout(() => clearInterval(checkECharts), 10000);
    }
})();
</script>
