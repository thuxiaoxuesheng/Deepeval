      <text x="259" y="80" fill="#A85A32" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" letter-spacing="0.6">EDITORIAL PIPELINE</text>

