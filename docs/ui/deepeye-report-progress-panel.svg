<svg width="2048" height="751" viewBox="0 0 2048 751" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>DeepEye Report Progress Panel</title>
  <defs>
    <linearGradient id="panelBg" x1="18" y1="306" x2="2032" y2="306" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCF9F8"/>
      <stop offset="1" stop-color="#F9F3F1"/>
    </linearGradient>
    <radialGradient id="panelGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1840 350) rotate(180) scale(620 430)">
