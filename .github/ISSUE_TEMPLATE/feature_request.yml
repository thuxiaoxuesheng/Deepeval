name: Feature request
description: Suggest a scoped improvement or new capability
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or developer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change at a practical level.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - backend
        - core
        - workflow nodes
        - sandbox/runtime
        - docs
        - deployment
        - other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
