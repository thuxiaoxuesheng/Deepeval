<svg width="1024" height="768" viewBox="0 0 1024 768" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>DeepEye Workspace Empty Shell</title>
  <defs>
    <linearGradient id="workspaceShellBg" x1="0" y1="0" x2="0" y2="768" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFBFC"/>
      <stop offset="1" stop-color="#F3F4F6"/>
    </linearGradient>
    <linearGradient id="workspaceCardBg" x1="18" y1="18" x2="18" y2="750" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8F9FB"/>
    </linearGradient>
    <symbol id="icon-menu" viewBox="0 0 24 24">
      <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-hide-assistant" viewBox="0 0 24 24">
      <path d="M4 7h16M4 12h10M4 17h16" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M18 10v4" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-document" viewBox="0 0 24 24">
      <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-folder" viewBox="0 0 24 24">
      <path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-workflow" viewBox="0 0 24 24">
      <rect width="8" height="8" x="3" y="3" rx="2"/>
      <path d="M7 11v4a2 2 0 0 0 2 2h4" stroke-linecap="round" stroke-linejoin="round"/>
      <rect width="8" height="8" x="13" y="13" rx="2"/>
    </symbol>
    <symbol id="icon-dashboard" viewBox="0 0 24 24">
      <rect width="7" height="9" x="3" y="3" rx="1"/>
      <rect width="7" height="5" x="14" y="3" rx="1"/>
      <rect width="7" height="9" x="14" y="12" rx="1"/>
      <rect width="7" height="5" x="3" y="16" rx="1"/>
    </symbol>
    <symbol id="icon-video" viewBox="0 0 24 24">
      <path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.87a.5.5 0 0 0-.752-.432L16 10.5" stroke-linecap="round" stroke-linejoin="round"/>
