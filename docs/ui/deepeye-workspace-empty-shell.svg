    <text x="512" y="334" text-anchor="middle" fill="#1F2430" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700">Open a workspace view</text>
    <text x="512" y="359" text-anchor="middle" fill="#7C8290" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="500">Files, workflows, reports, dashboards, and video previews appear here.</text>
  </g>

  <g id="workspace-cards">
    <g transform="translate(190 380)">
